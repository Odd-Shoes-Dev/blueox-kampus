<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Circular border -->
  <circle cx="100" cy="100" r="42" fill="none" stroke="#ff4040" stroke-width="2"/>
  
  <!-- External link icon - box with arrow pointing out -->
  <g transform="translate(100, 100)">
    <!-- Square/Box -->
    <rect x="-12" y="-8" width="16" height="16" fill="none" stroke="#ff4040" stroke-width="2" rx="2"/>
    
    <!-- Arrow pointing out (northeast) -->
    <line x1="6" y1="-12" x2="12" y2="-12" stroke="#ff4040" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="-12" x2="12" y2="-6" stroke="#ff4040" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="-12" x2="4" y2="-4" stroke="#ff4040" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
